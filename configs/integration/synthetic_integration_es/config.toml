# Reference config for dev_sst_02 integration tests (ES / Edvise schema).
# Deploy to:
#   /Volumes/dev_sst_02/synthetic_integration_es_bronze/bronze_volume/training_inputs/config.toml
#
# Inputs: GenAI-mapped cohort.parquet and course.parquet under the institution silver volume
# (genai_mapping/active/genai_active_registry.json). Bronze raw_course/raw_cohort are required
# by ESProjectConfig but unused when use_genai_inputs=true.

institution_id = "synthetic_integration_es"
institution_name = "Synthetic Integration ES"
use_genai_inputs = true

student_id_col = "learner_id"
target_col = "target"
split_col = "split"
sample_weight_col = "sample_weight"
student_group_cols = ["learner_age", "race", "ethnicity", "gender", "first_gen"]
pred_col = "pred"
pred_prob_col = "pred_prob"
pos_label = true
random_state = 12345

[datasets]
raw_course = "course.parquet"
raw_cohort = "cohort.parquet"

[preprocessing]
splits = { train = 0.6, test = 0.2, validate = 0.2 }
sample_class_weight = "balanced"
include_pre_cohort_courses = false

[preprocessing.features]
min_passing_grade = 1.0
min_num_credits_full_time = 12
course_level_pattern = '^(?:[A-Z_-]+)?(?P<course_level>\d)\d{2}(?:-?[A-Z\d]+)?$'
core_terms = ["FALL", "SPRING"]
key_course_subject_areas = []
key_course_ids = []

[preprocessing.selection]
student_criteria = { enrollment_type = "FIRST-TIME" }

[preprocessing.checkpoint]
name = "first_within_cohort"
type_ = "first_within_cohort"
exclude_non_core_terms = true
exclude_pre_cohort_terms = true

[preprocessing.target]
name = "retention"
type_ = "retention"
max_academic_year = "infer"

[modeling.feature_selection]
incomplete_threshold = 0.2
low_variance_threshold = 0.0
collinear_threshold = 10.0

[modeling.training]
primary_metric = "logloss"
timeout_minutes = 10
classification_threshold = 0.5

[modeling.evaluation]
topn_runs_included = 3

[inference]
num_top_features = 5
min_prob_pos_label = 0.5
background_data_sample = 500
term = ["fall 2024-25"]
