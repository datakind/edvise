bundle:
  name: edvise_metadata_dashboard

variables:
  sql_warehouse_id:
    description: SQL warehouse ID used by the metadata dashboard app and grant job
  datakind_group_to_manage_workflow:
    description: Group with permissions to manage the metadata dashboard app
  DB_workspace:
    description: Catalog name used by the metadata dashboard app

targets:
  dev:
    mode: development
    default: true
    variables:
      DB_workspace: dev_sst_02

  prod:
    mode: production
    variables:
      DB_workspace: staging_sst_01
    workspace:
      root_path: /Workspace/Shared/bundles/${bundle.name}/${bundle.target}

resources:
  apps:
    metadata_dashboard:
      name: edvise-metadata-dashboard
      source_code_path: .
      description: Streamlit app for Edvise pipeline metadata observability
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
      config:
        command:
          - streamlit
          - run
          - app.py
        env:
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: DB_workspace
            value: ${var.DB_workspace}
          - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
            value: "false"
      permissions:
        - group_name: ${var.datakind_group_to_manage_workflow}
          level: CAN_MANAGE
        - group_name: users
          level: CAN_USE

  jobs:
    grant_metadata_dashboard_access:
      name: grant_metadata_dashboard_access
      tasks:
        - task_key: grant_uc_permissions
          sql_task:
            file:
              path: ${workspace.file_path}/grant_app_permissions.sql
              source: WORKSPACE
            warehouse_id: ${var.sql_warehouse_id}
            parameters:
              DB_workspace: "{{job.parameters.DB_workspace}}"
              app_service_principal: "{{job.parameters.app_service_principal}}"
      parameters:
        - name: DB_workspace
          default: ${var.DB_workspace}
        - name: app_service_principal
          default: ${resources.apps.metadata_dashboard.service_principal_client_id}
      permissions:
        - group_name: ${var.datakind_group_to_manage_workflow}
          level: CAN_MANAGE
