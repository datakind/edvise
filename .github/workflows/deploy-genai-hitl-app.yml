# Databricks App: GenAI HITL reviewer (Streamlit, UC hitl_reviews).
# OAuth: DATABRICKS_GENAI_MAPPING_DEV_CLIENT_*. Host: DATABRICKS_DEV_HOST (workspace URL, same as PDP dev).
# SQL warehouse: DATABRICKS_DEV_SQL_WAREHOUSE_ID.
# Push (feat/hitl-ui-production-pipelines + paths) or Actions → Run workflow deploys dev and staging.
# Manual inputs deploy_dev / deploy_staging are reserved for future selective deploy (same as deploy-genai-mapping).

name: deploy-genai-hitl-app

on:
  push:
    # tags:
    #   - "v*"
    branches:
      - feat/hitl-ui-production-pipelines
concurrency:
  group: deploy-genai-hitl-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy GenAI HITL app to dev (dev_sst_02)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project (uv) — so bundle artifact build can use repo pyproject
        run: |
          uv venv
          uv pip install .
        working-directory: ${{ github.workspace }}

      - name: Build edvise wheel and pin HITL app requirements.txt
        run: |
          set -eux
          cd "${{ github.workspace }}"
          uv build
          HITL="src/edvise/genai/mapping/streamlit-genai-hitl-app"
          mkdir -p "$HITL/wheels"
          rm -f "$HITL/wheels"/edvise-*.whl
          cp dist/edvise-*.whl "$HITL/wheels/"
          (cd "$HITL" && python3 generate_requirements.py)

      - name: Deploy and start app (databricks.yml → target dev)
        working-directory: src/edvise/genai/mapping/streamlit-genai-hitl-app
        env:
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_GENAI_MAPPING_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_GENAI_MAPPING_DEV_CLIENT_SECRET }}
          SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_DEV_SQL_WAREHOUSE_ID }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
        run: |
          databricks bundle deploy \
            --target=dev \
            --force-lock \
            --var="sql_warehouse_id=$SQL_WAREHOUSE_ID" \
            --var="datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"
          databricks bundle run genai_hitl \
            --target=dev \
            --var="sql_warehouse_id=$SQL_WAREHOUSE_ID" \
            --var="datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"

  deploy-staging:
    name: Deploy GenAI HITL app to staging (staging_sst_01)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project (uv) — so bundle artifact build can use repo pyproject
        run: |
          uv venv
          uv pip install .
        working-directory: ${{ github.workspace }}

      - name: Build edvise wheel and pin HITL app requirements.txt
        run: |
          set -eux
          cd "${{ github.workspace }}"
          uv build
          HITL="src/edvise/genai/mapping/streamlit-genai-hitl-app"
          mkdir -p "$HITL/wheels"
          rm -f "$HITL/wheels"/edvise-*.whl
          cp dist/edvise-*.whl "$HITL/wheels/"
          (cd "$HITL" && python3 generate_requirements.py)

      - name: Deploy and start app (databricks.yml → target prod)
        working-directory: src/edvise/genai/mapping/streamlit-genai-hitl-app
        env:
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STAGING_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_GENAI_MAPPING_STAGING_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_GENAI_MAPPING_STAGING_CLIENT_SECRET }}
          SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_STAGING_SQL_WAREHOUSE_ID }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
        run: |
          databricks bundle deploy \
            --target=prod \
            --force-lock \
            --var="sql_warehouse_id=$SQL_WAREHOUSE_ID" \
            --var="datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"
          databricks bundle run genai_hitl \
            --target=prod \
            --var="sql_warehouse_id=$SQL_WAREHOUSE_ID" \
            --var="datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"
