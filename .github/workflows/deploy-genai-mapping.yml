# GenAI mapping bundle: manual deploy to dev and/or staging (Databricks OAuth + job identities for GenAI).
#
# Secrets — dev (host same as PDP dev: DATABRICKS_DEV_HOST):
#   DATABRICKS_DEV_HOST, DATABRICKS_GENAI_MAPPING_DEV_CLIENT_ID, DATABRICKS_GENAI_MAPPING_DEV_CLIENT_SECRET
#   GENAI_MAPPING_DEV_SERVICE_ACCOUNT_EXECUTER, GENAI_MAPPING_DEV_DS_RUN_AS
# Secrets — staging workspace (DATABRICKS_STAGING_HOST):
#   DATABRICKS_STAGING_HOST, DATABRICKS_STAGING_CLIENT_ID, DATABRICKS_STAGING_CLIENT_SECRET
#   STAGING_SERVICE_ACCOUNT_EXECUTER (SP run-as uses DATABRICKS_STAGING_CLIENT_ID)
#   Default deploy: bundle target staging (git commit → staging_sst_01). Optional input staging_git_tag uses target prod.
# Shared: GROUP_TO_MANAGE
#
# Auth: set DATABRICKS_AUTH_TYPE=oauth-m2m so the CLI uses the service principal OAuth
# secret (not PAT). If DATABRICKS_TOKEN is empty/set locally, unified auth can fail with
# "cannot configure default credentials" unless M2M is forced.

name: deploy-genai-mapping

on:
  push:
    branches:
      - feat/hitl-ui-production-pipelines
  workflow_dispatch:
    inputs:
      deploy_dev:
        description: "Deploy to dev_sst_02 (bundle target dev)"
        type: boolean
        default: true
      deploy_staging:
        description: "Deploy to staging_sst_01 (default: bundle target staging = git commit)"
        type: boolean
        default: false
      staging_git_tag:
        description: "Optional. If set, deploy with bundle target prod pinned to this tag instead of commit-based staging."
        type: string
        default: ""

concurrency:
  group: deploy-genai-mapping-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy GenAI mapping bundle to dev (dev_sst_02)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project dependencies (uv)
        run: |
          uv venv
          uv pip install .

      - name: Deploy bundle (dev)
        working-directory: pipelines/genai_mapping
        env:
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_GENAI_MAPPING_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_GENAI_MAPPING_DEV_CLIENT_SECRET }}
          SA_EXECUTER: ${{ secrets.GENAI_MAPPING_DEV_SERVICE_ACCOUNT_EXECUTER }} 
          DS_RUN_AS: ${{ secrets.DATABRICKS_GENAI_MAPPING_DEV_CLIENT_ID }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
        run: |
          databricks bundle deploy \
            --target=dev \
            --force-lock \
            --var "git_commit=${GITHUB_SHA}" \
            --var "service_account_executer=$SA_EXECUTER" \
            --var "ds_run_as=$DS_RUN_AS" \
            --var "datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"

  deploy-staging:
    name: Deploy GenAI mapping bundle to staging (staging_sst_01)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project dependencies (uv)
        run: |
          uv venv
          uv pip install .

      - name: Deploy bundle (staging_sst_01)
        working-directory: pipelines/genai_mapping
        env:
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STAGING_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_STAGING_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_STAGING_CLIENT_SECRET }}
          SA_EXECUTER: ${{ secrets.STAGING_SERVICE_ACCOUNT_EXECUTER }}
          DS_RUN_AS: ${{ secrets.DATABRICKS_STAGING_CLIENT_ID }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
        run: |
          TAG="${{ inputs.staging_git_tag }}"
          COMMON_VARS=(
            --force-lock
            --var "service_account_executer=$SA_EXECUTER"
            --var "ds_run_as=$DS_RUN_AS"
            --var "datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"
          )
          if [ -n "$TAG" ]; then
            echo "Deploying staging with bundle target prod (git tag: $TAG)"
            databricks bundle deploy \
              --target=prod \
              "${COMMON_VARS[@]}" \
              --var "git_tag=$TAG"
          else
            echo "Deploying staging with bundle target staging (git commit: ${GITHUB_SHA})"
            databricks bundle deploy \
              --target=staging \
              "${COMMON_VARS[@]}" \
              --var "git_commit=${GITHUB_SHA}"
          fi
