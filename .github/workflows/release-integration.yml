name: release-branch-ci-dev

on:
  # run when release branch is created from git flow
  push:
    branches:
      - 'release/*'

  workflow_dispatch:
    inputs:
      force_integration:
        description: 'Run integration tests even for patch releases'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

concurrency:
  group: release-branch-ci-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  CONFIG_FILE: config.toml
  DB_RUN_ID_PREFIX: release_${{ github.sha }}
  DB_WORKSPACE: dev_sst_02
  GIT_COMMIT: ${{ github.sha }}

jobs:
  classify-release:
    name: Classify release bump
    runs-on: ubuntu-latest
    outputs:
      run_integration: ${{ steps.classify.outputs.run_integration }}
      bump_type: ${{ steps.classify.outputs.bump_type }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11.11" }

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install project dependencies (uv)
        run: |
          uv venv
          uv pip install .

      - id: classify
        env:
          FORCE_INTEGRATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_integration || 'false' }}
        run: |
          set -euo pipefail
          BR="${GITHUB_REF#refs/heads/}"
          VER="${BR#release/}"
          [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Bad release branch: $BR"; exit 1; }

          read -r BUMP RUN <<< "$(uv run python -c "
          from edvise.utils.automate_releases import (
              classify_release_bump,
              get_last_version_tag,
              should_run_release_integration,
          )
          import os

          version = '${VER}'
          previous_tag = get_last_version_tag()
          previous_version = previous_tag.lstrip('v') if previous_tag else None
          bump = classify_release_bump(version, previous_version)
          run = should_run_release_integration(version, previous_version)
          if os.environ.get('FORCE_INTEGRATION', 'false').lower() == 'true':
              run = True
          print(bump, str(run).lower())
          ")"

          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "run_integration=$RUN" >> "$GITHUB_OUTPUT"

          {
            echo "## Release classification"
            echo "- Version: \`$VER\`"
            echo "- Bump type: \`$BUMP\`"
            echo "- Run integration: \`$RUN\`"
          } >> "$GITHUB_STEP_SUMMARY"

  pdp-integration:
    name: PDP Train + Inference on Dev (release branch)
    needs: classify-release
    if: needs.classify-release.outputs.run_integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      INSTITUTION: synthetic_integration
      MODEL_NAME: retention_into_year_2_bachelors
      BUNDLE_DIR: pipelines/pdp
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11.11" }

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project dependencies (uv)
        run: |
          uv venv
          uv pip install .
        shell: bash

      - name: Configure Databricks env (Dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: databricks version

      - name: Deploy PDP bundle to Dev
        working-directory: ${{ env.BUNDLE_DIR }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
          SA_EXECUTER: ${{ secrets.DEV_SERVICE_ACCOUNT_EXECUTER }}
          DS_RUN_AS: ${{ secrets.DEV_DS_RUN_AS }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
          DATAKIND_EMAIL: ${{ secrets.DATAKIND_EMAIL }}
        run: |
          databricks bundle deploy \
            --target dev \
            --var "git_commit=$GIT_COMMIT" \
            --var "DB_workspace=$DB_WORKSPACE" \
            --var "service_account_executer=$SA_EXECUTER" \
            --var "ds_run_as=$DS_RUN_AS" \
            --var "databricks_institution_name=$INSTITUTION" \
            --var "datakind_group_to_manage_workflow=$GROUP_TO_MANAGE" \
            --var "datakind_notification_email=$DATAKIND_EMAIL"

      - name: PDP TRAIN (Dev – develop-release-check)
        working-directory: ${{ env.BUNDLE_DIR }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: |
          databricks bundle run github_sourced_pdp_training_pipeline --target dev \
            --var "git_commit=$GIT_COMMIT" \
            --var "DB_workspace=$DB_WORKSPACE" \
            --var "service_account_executer=${{ secrets.DEV_SERVICE_ACCOUNT_EXECUTER }}" \
            --var "ds_run_as=${{ secrets.DEV_DS_RUN_AS }}" \
            --var "datakind_group_to_manage_workflow=${{ secrets.GROUP_TO_MANAGE }}" \
            --var "databricks_institution_name=$INSTITUTION" \
            --var "datakind_notification_email=${{ secrets.DATAKIND_EMAIL }}" \
            --var "DK_CC_EMAIL=${{ secrets.DATAKIND_EMAIL }}" \
            --params config_file_name="$CONFIG_FILE",job_type=training,db_run_id="${DB_RUN_ID_PREFIX}_pdp_train"

      - name: PDP INFER (Dev – develop-release-check)
        working-directory: ${{ env.BUNDLE_DIR }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: |
          databricks bundle run edvise_github_sourced_pdp_inference_pipeline --target dev \
            --var "git_commit=$GIT_COMMIT" \
            --var "DB_workspace=$DB_WORKSPACE" \
            --var "service_account_executer=${{ secrets.DEV_SERVICE_ACCOUNT_EXECUTER }}" \
            --var "ds_run_as=${{ secrets.DEV_DS_RUN_AS }}" \
            --var "datakind_group_to_manage_workflow=${{ secrets.GROUP_TO_MANAGE }}" \
            --var "databricks_institution_name=$INSTITUTION" \
            --var "datakind_notification_email=${{ secrets.DATAKIND_EMAIL }}" \
            --var "DK_CC_EMAIL=${{ secrets.DATAKIND_EMAIL }}" \
            --params "model_name=$MODEL_NAME,config_file_name=$CONFIG_FILE,job_type=inference,db_run_id=${DB_RUN_ID_PREFIX}_pdp_inference"

  es-integration:
    name: ES Train + Inference on Dev (release branch)
    needs: classify-release
    if: needs.classify-release.outputs.run_integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      INSTITUTION: synthetic_integration_es
      MODEL_NAME: graduation_in_4y_ft_checkpoint_45_credits
      BUNDLE_DIR: pipelines/es
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11.11" }

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project dependencies (uv)
        run: |
          uv venv
          uv pip install .
        shell: bash

      - name: Configure Databricks env (Dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: databricks version

      - name: Deploy ES bundle to Dev
        working-directory: ${{ env.BUNDLE_DIR }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
          SA_EXECUTER: ${{ secrets.DEV_SERVICE_ACCOUNT_EXECUTER }}
          DS_RUN_AS: ${{ secrets.DEV_DS_RUN_AS }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
          DATAKIND_EMAIL: ${{ secrets.DATAKIND_EMAIL }}
        run: |
          databricks bundle deploy \
            --target dev \
            --var "git_commit=$GIT_COMMIT" \
            --var "DB_workspace=$DB_WORKSPACE" \
            --var "service_account_executer=$SA_EXECUTER" \
            --var "ds_run_as=$DS_RUN_AS" \
            --var "databricks_institution_name=$INSTITUTION" \
            --var "datakind_group_to_manage_workflow=$GROUP_TO_MANAGE" \
            --var "datakind_notification_email=$DATAKIND_EMAIL"

      - name: ES TRAIN (Dev – develop-release-check)
        working-directory: ${{ env.BUNDLE_DIR }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: |
          databricks bundle run github_sourced_es_training_pipeline --target dev \
            --var "git_commit=$GIT_COMMIT" \
            --var "DB_workspace=$DB_WORKSPACE" \
            --var "service_account_executer=${{ secrets.DEV_SERVICE_ACCOUNT_EXECUTER }}" \
            --var "ds_run_as=${{ secrets.DEV_DS_RUN_AS }}" \
            --var "datakind_group_to_manage_workflow=${{ secrets.GROUP_TO_MANAGE }}" \
            --var "databricks_institution_name=$INSTITUTION" \
            --var "datakind_notification_email=${{ secrets.DATAKIND_EMAIL }}" \
            --var "DK_CC_EMAIL=${{ secrets.DATAKIND_EMAIL }}" \
            --params config_file_name="$CONFIG_FILE",job_type=training,schema_type=edvise,db_run_id="${DB_RUN_ID_PREFIX}_es_train"

      - name: ES INFER (Dev – develop-release-check)
        working-directory: ${{ env.BUNDLE_DIR }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: |
          databricks bundle run github_sourced_genai_es_inference_pipeline --target dev \
            --var "git_commit=$GIT_COMMIT" \
            --var "DB_workspace=$DB_WORKSPACE" \
            --var "service_account_executer=${{ secrets.DEV_SERVICE_ACCOUNT_EXECUTER }}" \
            --var "ds_run_as=${{ secrets.DEV_DS_RUN_AS }}" \
            --var "datakind_group_to_manage_workflow=${{ secrets.GROUP_TO_MANAGE }}" \
            --var "databricks_institution_name=$INSTITUTION" \
            --var "datakind_notification_email=${{ secrets.DATAKIND_EMAIL }}" \
            --var "DK_CC_EMAIL=${{ secrets.DATAKIND_EMAIL }}" \
            --params "model_name=$MODEL_NAME,config_file_name=$CONFIG_FILE,job_type=inference,schema_type=edvise,is_genai_institution=true,db_run_id=${DB_RUN_ID_PREFIX}_es_inference"

  trigger-finish-release:
    name: Trigger Finish Release
    needs: [classify-release, pdp-integration, es-integration]
    # Run when classify succeeded and any required integration jobs succeeded or were skipped (patch).
    if: >
      always() &&
      needs.classify-release.result == 'success' &&
      (needs.pdp-integration.result == 'success' || needs.pdp-integration.result == 'skipped') &&
      (needs.es-integration.result == 'success' || needs.es-integration.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Finish Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.classify-release.outputs.version }}
        run: |
          set -euo pipefail
          BR="release/${VERSION}"
          # Use this release branch as --ref so the Finish Release YAML present on the
          # release branch is used (GITHUB_TOKEN may dispatch workflow_dispatch).
          gh workflow run "Finish Release" --ref "$BR" -f version="$VERSION"
          echo "✓ Triggered Finish Release for $BR" >> "$GITHUB_STEP_SUMMARY"
