name: deploy-metadata-dashboard-manual

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v0.1.6)"
        required: true

concurrency:
  group: deploy-metadata-dashboard-manual-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Manually deploy metadata dashboard app to staging_sst_01
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and checkout tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "Requested tag: $TAG"

          if [[ "$TAG" != v* ]]; then
            echo "Error: tag ($TAG) must start with 'v' (e.g. v0.1.6)"
            exit 1
          fi

          git fetch --tags --force

          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Error: tag '$TAG' does not exist in this repository."
            echo "Available tags:"
            git tag --list "v*"
            exit 1
          fi

          git checkout "refs/tags/$TAG"

          echo "Using tag: $TAG"
          echo "DEPLOY_TAG=$TAG" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project dependencies (uv)
        run: |
          uv venv
          uv pip install .

      - name: Configure Databricks env (Staging)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STAGING_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_STAGING_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_STAGING_CLIENT_SECRET }}
        run: |
          databricks version

      - name: Deploy and start metadata dashboard app (prod target -> staging_sst_01)
        working-directory: src/edvise/shared/dashboard_metadata/streamlit-data-app
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STAGING_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_STAGING_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_STAGING_CLIENT_SECRET }}
          SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_STAGING_SQL_WAREHOUSE_ID }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
        run: |
          databricks current-user me
          echo "Deploying metadata dashboard app to staging_sst_01 for tag $DEPLOY_TAG..."
          databricks bundle deploy \
            --target=prod \
            --force-lock \
            --var="sql_warehouse_id=$SQL_WAREHOUSE_ID" \
            --var="datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"
          databricks bundle run metadata_dashboard --target=prod

  deploy-dev:
    name: Manually deploy metadata dashboard app to dev_sst_02
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: deploy-staging
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and checkout tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "Requested tag: $TAG"

          if [[ "$TAG" != v* ]]; then
            echo "Error: tag ($TAG) must start with 'v' (e.g. v0.1.6)"
            exit 1
          fi

          git fetch --tags --force

          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Error: tag '$TAG' does not exist in this repository."
            echo "Available tags:"
            git tag --list "v*"
            exit 1
          fi

          git checkout "refs/tags/$TAG"

          echo "Using tag: $TAG"
          echo "DEPLOY_TAG=$TAG" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install uv and Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install uv
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks -v
        shell: bash

      - name: Install project dependencies (uv)
        run: |
          uv venv
          uv pip install .

      - name: Configure Databricks env (Dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: |
          databricks version

      - name: Deploy and start metadata dashboard app (dev target -> dev_sst_02)
        working-directory: src/edvise/shared/dashboard_metadata/streamlit-data-app
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
          SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_DEV_SQL_WAREHOUSE_ID }}
          GROUP_TO_MANAGE: ${{ secrets.GROUP_TO_MANAGE }}
        run: |
          databricks current-user me
          echo "Deploying metadata dashboard app to dev_sst_02 for tag $DEPLOY_TAG..."
          databricks bundle deploy \
            --target=dev \
            --force-lock \
            --var="sql_warehouse_id=$SQL_WAREHOUSE_ID" \
            --var="datakind_group_to_manage_workflow=$GROUP_TO_MANAGE"
          databricks bundle run metadata_dashboard --target=dev
