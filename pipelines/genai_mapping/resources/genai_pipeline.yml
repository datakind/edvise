resources:
  jobs:
    edvise-genai-pipeline:
      name: edvise-genai-pipeline
      timeout_seconds: 7200
      max_concurrent_runs: 5
      queue:
        enabled: true

      tasks:
        - task_key: ia_onboard_start
          spark_python_task:
            python_file: src/edvise/genai/mapping/scripts/edvise_genai_ia.py
            source: GIT
            parameters:
              - --institution_id
              - "{{job.parameters.institution_id}}"
              - --pipeline_run_id
              - "{{job.parameters.pipeline_run_id}}"
              - --catalog
              - "{{job.parameters.catalog}}"
              - --mode
              - onboard
              - --resume_from
              - start
              - --inputs_toml
              - "{{job.parameters.inputs_toml}}"
          job_cluster_key: edvise-genai-pipeline-cluster
          libraries: &genai_mapping_libs
            - pypi:
                package: pandas==2.2.3
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: python-dotenv==1.0.1
            - pypi:
                package: openai>=1.0.0
            - pypi:
                package: databricks-sdk~=0.38.0
            - pypi:
                package: pyarrow>=14.0.0

        - task_key: ia_onboard_gate_1
          depends_on:
            - task_key: ia_onboard_start
          spark_python_task:
            python_file: src/edvise/genai/mapping/scripts/edvise_genai_ia.py
            source: GIT
            parameters:
              - --institution_id
              - "{{job.parameters.institution_id}}"
              - --pipeline_run_id
              - "{{job.parameters.pipeline_run_id}}"
              - --catalog
              - "{{job.parameters.catalog}}"
              - --mode
              - onboard
              - --resume_from
              - gate_1
              - --inputs_toml
              - "{{job.parameters.inputs_toml}}"
              - --hitl_poll_interval_seconds
              - "{{job.parameters.hitl_poll_interval_seconds}}"
              - --hitl_timeout_seconds
              - "{{job.parameters.hitl_timeout_seconds}}"
          job_cluster_key: edvise-genai-pipeline-cluster
          libraries: *genai_mapping_libs

        - task_key: sma_onboard_start
          depends_on:
            - task_key: ia_onboard_gate_1
          spark_python_task:
            python_file: src/edvise/genai/mapping/scripts/edvise_genai_sma.py
            source: GIT
            parameters:
              - --institution_id
              - "{{job.parameters.institution_id}}"
              - --pipeline_run_id
              - "{{job.parameters.pipeline_run_id}}"
              - --catalog
              - "{{job.parameters.catalog}}"
              - --mode
              - onboard
              - --resume_from
              - start
              - --reference_id
              - "{{job.parameters.reference_id}}"
              - --model_id
              - "{{job.parameters.model_id}}"
          job_cluster_key: edvise-genai-pipeline-cluster
          libraries: *genai_mapping_libs

        - task_key: sma_onboard_gate_2
          depends_on:
            - task_key: sma_onboard_start
          spark_python_task:
            python_file: src/edvise/genai/mapping/scripts/edvise_genai_sma.py
            source: GIT
            parameters:
              - --institution_id
              - "{{job.parameters.institution_id}}"
              - --pipeline_run_id
              - "{{job.parameters.pipeline_run_id}}"
              - --catalog
              - "{{job.parameters.catalog}}"
              - --mode
              - onboard
              - --resume_from
              - gate_2
              - --reference_id
              - "{{job.parameters.reference_id}}"
              - --model_id
              - "{{job.parameters.model_id}}"
              - --hitl_poll_interval_seconds
              - "{{job.parameters.hitl_poll_interval_seconds}}"
              - --hitl_timeout_seconds
              - "{{job.parameters.hitl_timeout_seconds}}"
          job_cluster_key: edvise-genai-pipeline-cluster
          libraries: *genai_mapping_libs

      job_clusters:
        - job_cluster_key: edvise-genai-pipeline-cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            gcp_attributes:
              use_preemptible_executors: false
              availability: ON_DEMAND_GCP
              zone_id: HA
            node_type_id: n2-standard-16
            custom_tags:
              ResourceClass: SingleNode
              x-databricks-nextgen-cluster: "true"
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0

      parameters:
        - name: institution_id
          default: ""
        - name: pipeline_run_id
          default: ""
        - name: catalog
          default: ${var.DB_workspace}
        - name: inputs_toml
          default: ""
        - name: reference_id
          default: ""
        - name: model_id
          default: "claude-sonnet-test-genai-ai-data-cleaning"
        - name: hitl_poll_interval_seconds
          default: "30"
        - name: hitl_timeout_seconds
          default: "1200"

      permissions:
        - group_name: ${var.datakind_group_to_manage_workflow}
          level: CAN_MANAGE
        - service_principal_name: ${var.ds_run_as}
          level: CAN_MANAGE
        - user_name: ${var.service_account_executer}
          level: CAN_MANAGE
