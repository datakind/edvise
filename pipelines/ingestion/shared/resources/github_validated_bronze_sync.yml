resources:
  jobs:
    edvise_validated_gcs_to_bronze_sync:
      name: edvise_validated_gcs_to_bronze_sync
      webhook_notifications:
        on_failure:
          - id: ${var.inference_slack_webhook_id}
      # Allow concurrent runs across institutions: each run uses a distinct
      # gcp_bucket_name + databricks_institution_name. A global cap still limits
      # total parallel runs; tune if the workspace is large enough to need more
      # throughput. Same-institution double-runs are an upstream concern (API ordering).
      max_concurrent_runs: 5
      tasks:
        - task_key: sync_validated_to_bronze
          spark_python_task:
            python_file: src/edvise/scripts/gcs_validated_to_bronze_sync.py
            source: GIT
            parameters:
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --gcp_bucket_name
              - "{{job.parameters.gcp_bucket_name}}"
              - --batch_id
              - "{{job.parameters.batch_id}}"
              - --gcs_source_prefix
              - "{{job.parameters.gcs_source_prefix}}"
              - --bronze_subdir
              - "{{job.parameters.bronze_subdir}}"
              - --max_objects
              - "{{job.parameters.max_objects}}"
              - --require_at_least_one_file
              - "{{job.parameters.require_at_least_one_file}}"
              - --strict_mode
              - "{{job.parameters.strict_mode}}"
              - --include_blob_paths_json
              - "{{job.parameters.include_blob_paths_json}}"
          job_cluster_key: edvise-validated-bronze-sync-cluster
          libraries:
            - pypi:
                package: google-cloud-storage==2.19.0
      job_clusters:
        - job_cluster_key: edvise-validated-bronze-sync-cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-cpu-ml-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            gcp_attributes:
              use_preemptible_executors: false
              availability: ON_DEMAND_GCP
              zone_id: HA
            node_type_id: n2-standard-8
            custom_tags:
              ResourceClass: SingleNode
              x-databricks-nextgen-cluster: "true"
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      queue:
        enabled: true
      parameters:
        - name: DB_workspace
          default: ${var.DB_workspace}
        - name: databricks_institution_name
          default: ${var.databricks_institution_name}
        - name: gcp_bucket_name
          default: ""
        # Empty = files land directly under bronze_subdir (default gcs_uploads).
        - name: batch_id
          default: ""
        - name: gcs_source_prefix
          default: validated/
        - name: bronze_subdir
          default: gcs_uploads
        - name: max_objects
          default: "1000"
        - name: require_at_least_one_file
          default: "true"
        - name: strict_mode
          default: auto
        # JSON array of full object paths, e.g. ["validated/file.csv"]. [] = all under prefix.
        - name: include_blob_paths_json
          default: "[]"
      permissions:
        - group_name: ${var.datakind_group_to_manage_workflow}
          level: CAN_MANAGE
        - service_principal_name: ${var.ds_run_as}
          level: CAN_MANAGE
        - user_name: ${var.service_account_executer}
          level: CAN_MANAGE
