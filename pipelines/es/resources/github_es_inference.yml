# ES inference triggered by edvise-api run_es_inference().
#
# API-overridden job parameters (see edvise-api develop databricks.py):
#   is_genai_institution — "true" when institution has genai_id, else "false" (edvise_id)
#   schema_type          — always "edvise"
#   model_name, databricks_institution_name, DB_workspace, gcp_bucket_name,
#   datakind_notification_email, DK_CC_EMAIL, config_file_name
#
# batch_id / validated_blob_paths_json — passed by API; bronze batch wiring is a follow-up PR.
#
# is_genai_institution gates genai_mapping_execute (true) vs skipping straight to data_audit
# (false). inference_setup → check → data_audit merges both paths: edvise_id via check
# outcome "false", genai_id via genai_mapping_execute; run_if NONE_FAILED allows the skipped branch.
resources:
  jobs:
    github_sourced_es_inference_pipeline:
      name: github_sourced_es_inference_pipeline
      # Slack disabled while ES inference + GenAI wiring is in flux; restore webhook_notifications
      # with ${var.inference_slack_webhook_id} when stable.
      max_concurrent_runs: 5
      tasks:
        - task_key: inference_setup
          spark_python_task:
            python_file: src/edvise/scripts/es_inference_inputs.py
            source: GIT
            parameters:
              - --model_name
              - "{{job.parameters.model_name}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
          job_cluster_key: edvise-es-inference-pipeline-cluster
          libraries:
            # inference_setup: resolve config_file_path from trained model silver artifacts.
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
            - pypi:
                package: pyarrow~=16.0
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: mlflow~=2.22
        - task_key: check_is_genai_institution
          depends_on:
            - task_key: inference_setup
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.is_genai_institution}}"
            right: "true"
        - task_key: genai_mapping_execute
          depends_on:
            - task_key: inference_setup
            - task_key: check_is_genai_institution
              outcome: "true"
          run_job_task:
            job_id: ${resources.jobs.edvise_genai_mapping_execute_pipeline.id}
            job_parameters:
              institution_id: "{{job.parameters.databricks_institution_name}}"
              catalog: "{{job.parameters.DB_workspace}}"
              inputs_toml_path: "{{job.parameters.genai_inputs_toml_path}}"
              pipeline_version: "{{job.parameters.pipeline_version}}"
              db_run_id: "{{job.parameters.db_run_id}}_genai_execute"
        - task_key: data_audit
          depends_on:
            - task_key: check_is_genai_institution
              outcome: "false"
            - task_key: genai_mapping_execute
          run_if: NONE_FAILED
          spark_python_task:
            python_file: src/edvise/scripts/es_data_audit.py
            source: GIT
            parameters:
              - --bronze_volume_path
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_bronze/bronze_volume"
              - --silver_volume_path
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_silver/silver_volume"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --config_file_path
              - "{{tasks.inference_setup.values.config_file_path}}"
              - --job_type
              - "{{job.parameters.job_type}}"
              - --db_run_id
              - "{{job.parameters.db_run_id}}"
              - --is_genai_institution
              - "{{job.parameters.is_genai_institution}}"
          job_cluster_key: edvise-es-inference-pipeline-cluster
          libraries:
            - pypi:
                package: pandas==2.2.3
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: faker==33.1.0
            - pypi:
                package: google-cloud-storage==2.19.0
            - pypi:
                package: scikit-learn==1.5.2
            - pypi:
                package: missingno==0.5.2
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
        - task_key: feature_generation
          depends_on:
            - task_key: data_audit
          spark_python_task:
            python_file: src/edvise/scripts/es_feature_generation.py
            source: GIT
            parameters:
              - --silver_volume_path
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_silver/silver_volume"
              - --config_file_path
              - "{{tasks.inference_setup.values.config_file_path}}"
              - --job_type
              - "{{job.parameters.job_type}}"
              - --db_run_id
              - "{{job.parameters.db_run_id}}"
          job_cluster_key: edvise-es-inference-pipeline-cluster
          libraries:
            - pypi:
                package: pandas==2.2.3
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: faker==33.1.0
            - pypi:
                package: google-cloud-storage==2.19.0
            - pypi:
                package: scikit-learn==1.5.2
            - pypi:
                package: missingno==0.5.2
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
        - task_key: checkpoint
          depends_on:
            - task_key: feature_generation
          spark_python_task:
            python_file: src/edvise/scripts/checkpoints.py
            source: GIT
            parameters:
              - --silver_volume_path
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_silver/silver_volume"
              - --config_file_path
              - "{{tasks.inference_setup.values.config_file_path}}"
              - --schema_type
              - "{{job.parameters.schema_type}}"
              - --job_type
              - "{{job.parameters.job_type}}"
              - --db_run_id
              - "{{job.parameters.db_run_id}}"
          job_cluster_key: edvise-es-inference-pipeline-cluster
          libraries:
            - pypi:
                package: pandas==2.2.3
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: faker==33.1.0
            - pypi:
                package: google-cloud-storage==2.19.0
            - pypi:
                package: scikit-learn==1.5.2
            - pypi:
                package: missingno==0.5.2
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
        - task_key: student_selection
          depends_on:
            - task_key: feature_generation
          spark_python_task:
            python_file: src/edvise/scripts/student_selection.py
            source: GIT
            parameters:
              - --silver_volume_path
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_silver/silver_volume"
              - --config_file_path
              - "{{tasks.inference_setup.values.config_file_path}}"
              - --schema_type
              - "{{job.parameters.schema_type}}"
              - --job_type
              - "{{job.parameters.job_type}}"
              - --db_run_id
              - "{{job.parameters.db_run_id}}"
          job_cluster_key: edvise-es-inference-pipeline-cluster
          libraries:
            - pypi:
                package: pandas==2.2.3
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: faker==33.1.0
            - pypi:
                package: google-cloud-storage==2.19.0
            - pypi:
                package: scikit-learn==1.5.2
            - pypi:
                package: missingno==0.5.2
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
        - task_key: inf_prep
          depends_on:
            - task_key: checkpoint
            - task_key: student_selection
          spark_python_task:
            python_file: src/edvise/scripts/inf_prep.py
            source: GIT
            parameters:
              - --silver_volume_path
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_silver/silver_volume"
              - --db_run_id
              - "{{job.parameters.db_run_id}}"
              - --term_filter
              - "{{job.parameters.term_filter}}"
              - --config_file_path
              - "{{tasks.inference_setup.values.config_file_path}}"
              - --schema_type
              - "{{job.parameters.schema_type}}"
              - --job_type
              - "{{job.parameters.job_type}}"
          job_cluster_key: edvise-es-inference-pipeline-cluster
          libraries:
            - pypi:
                package: pandas==2.2.3
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: faker==33.1.0
            - pypi:
                package: google-cloud-storage==2.19.0
            - pypi:
                package: missingno==0.5.2
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
        - task_key: inference_h2o
          depends_on:
            - task_key: inf_prep
          spark_python_task:
            python_file: src/edvise/scripts/inference_h2o.py
            source: GIT
            parameters:
              - --silver_volume_path
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_silver/silver_volume"
              - --db_run_id
              - "{{job.parameters.db_run_id}}"
              - --ds_run_as
              - "{{job.parameters.ds_run_as}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --datakind_notification_email
              - "{{job.parameters.datakind_notification_email}}"
              - --DK_CC_EMAIL
              - "{{job.parameters.DK_CC_EMAIL}}"
              - --job_root_dir  
              - "/Volumes/{{job.parameters.DB_workspace}}/{{job.parameters.databricks_institution_name}}_gold/gold_volume/inference_jobs/{{job.parameters.db_run_id}}"
              - --config_file_path
              - "{{tasks.inference_setup.values.config_file_path}}"
              - --schema_type
              - "{{job.parameters.schema_type}}"
          job_cluster_key: edvise-es-inference-pipeline-cluster
          libraries:
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: pandas==2.2.3
            - pypi:
                package: faker==33.1.0
            - pypi:
                package: google-cloud-storage==2.19.0
            - pypi:
                package: missingno==0.5.2
            - pypi:
                package: tomli==2.2.1
            - pypi:
                package: tomlkit==0.13.3
            - pypi:
                package: pandera==0.23.0
            - pypi:
                package: pydantic~=2.10
            - pypi:
                package: h2o==3.46.0.7
            - pypi:
                package: shap~=0.46.0
            - pypi:
                package: mlflow~=2.22
            - pypi:
                package: scikit-learn==1.5.2      
      job_clusters:
        - job_cluster_key: edvise-es-inference-pipeline-cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-cpu-ml-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            gcp_attributes:
              use_preemptible_executors: false
              availability: ON_DEMAND_GCP
              zone_id: HA
            node_type_id: n2-standard-16
            custom_tags:
              ResourceClass: SingleNode
              x-databricks-nextgen-cluster: "true"
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      queue:
        enabled: true
      parameters:
        - name: term_filter
          default: ""
        - name: schema_type
          default: edvise
        - name: databricks_institution_name
          default: city_cols_of_chicago
        - name: db_run_id
          default: "{{job.run_id}}"
        - name: DB_workspace
          default: ${var.DB_workspace}
        - name: DK_CC_EMAIL
          default: ${var.datakind_notification_email}
        - name: config_file_name
          default: ${var.config_file_name}
        - name: ds_run_as
          default: ${var.ds_run_as}
        - name: gcp_bucket_name
          default: databricks-2052166062819251-unitycatalog
        - name: datakind_notification_email
          default: ${var.datakind_notification_email}
        - name: service_account_executer
          default: ${var.service_account_executer}
        - name: job_type
          default: inference
        - name: model_name
          default: retention_into_year_2_all_degrees
        - name: pipeline_version
          default: ${var.pipeline_version}
        - name: genai_inputs_toml_path
          default: "inputs.toml"
        - name: is_genai_institution
          default: "false"
      permissions:
        - group_name: ${var.datakind_group_to_manage_workflow} 
          level: CAN_MANAGE
        - service_principal_name: ${var.ds_run_as}
          level: CAN_MANAGE
        - user_name: ${var.service_account_executer}
          level: CAN_MANAGE