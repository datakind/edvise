bundle:
  name: Edvise legacy H2O pipeline
  uuid: f4a8b7c2-3d9e-41f2-b8c5-1e6d7a9f0b2c

include:
  - resources/github_legacy_training.yml
  - resources/github_legacy_inference.yml

variables:
  git_commit:
    description: "Commit SHA to fetch (dev/CI)"
    default: ""
  git_tag:
    description: "Release tag to fetch for deployment (prod)"
    default: ""
  DB_workspace:
    description: "Databricks workspace"
  datakind_notification_email:
    description: "Datakind address used to send email notifications"
    default: ""
  DK_CC_EMAIL:
    description: "Datakind address used to CC email notifications"
    default: ""
  service_account_executer:
    description: "Service account to execute the pipeline"
  ds_run_as:
    description: "Account to run the pipeline (Databricks SP client/app ID)"
  databricks_institution_name:
    description: "Institution ID for legacy training and inference (SSI pipelines/<this>/)"
  ssi_workspace_model_name:
    description: >
      Subfolder under student-success-intervention/pipelines/<databricks_institution_name>/
      that contains preprocessing.py (e.g. john_jay_col_graduation_6years_time_cuny_transfer). Not the UC registered model_name.
    default: ""
  config_file_name:
    description: >
      Basename of config TOML for default path pipelines/<inst>/<ssi_workspace_model_name>/<config_file_name>.
    default: "config.toml"
  features_table_name:
    description: >
      Basename of features TOML for default path pipelines/<inst>/<ssi_workspace_model_name>/<features_table_name>.
    default: "features_table.toml"
  ssi_config_toml_relative_to_institution:
    description: >
      Optional path under pipelines/<inst>/ to config TOML (forward slashes, no '..'). Empty uses
      <ssi_workspace_model_name>/<config_file_name>.
    default: ""
  ssi_features_toml_relative_to_institution:
    description: >
      Optional path under pipelines/<inst>/ to features TOML. Empty uses
      <ssi_workspace_model_name>/<features_table_name> (set to e.g. shared/features_table.toml when shared).
    default: ""
  ssi_pipelines_workspace_root:
    description: >
      Optional override for the Databricks workspace path to student-success-intervention/pipelines.
      Empty uses DEFAULT_SSI_PIPELINES_WORKSPACE_ROOT in legacy_preprocessing.
    default: ""
  legacy_preprocessing_enabled:
    description: "If true, run legacy_preprocessing before training_h2o; set false if modeling tables are pre-built"
    default: "true"
  datakind_group_to_manage_workflow:
    description: "Group with permissions to manage the job"
  model_name:
    description: "Registered model name for legacy inference (Unity Catalog / MLflow)"
    default: ""

run_as:
  service_principal_name: ${var.ds_run_as}

targets:
  dev:
    mode: development
    variables:
      DB_workspace: "dev_sst_02"
    resources:
      jobs:
        edvise_github_sourced_legacy_training_pipeline:
          parameters:
            - name: pipeline_version
              default: ${var.git_commit}
          git_source:
            git_url: https://github.com/datakind/edvise
            git_provider: gitHub
            git_commit: ${var.git_commit}
        edvise_github_sourced_legacy_inference_pipeline:
          git_source:
            git_url: https://github.com/datakind/edvise
            git_provider: gitHub
            git_commit: ${var.git_commit}
    default: true

  prod:
    mode: production
    variables:
      DB_workspace: "staging_sst_01"
    resources:
      jobs:
        edvise_github_sourced_legacy_training_pipeline:
          parameters:
            - name: pipeline_version
              default: ${var.git_tag}
          git_source:
            git_url: https://github.com/datakind/edvise
            git_provider: gitHub
            git_tag: ${var.git_tag}
        edvise_github_sourced_legacy_inference_pipeline:
          git_source:
            git_url: https://github.com/datakind/edvise
            git_provider: gitHub
            git_tag: ${var.git_tag}
    workspace:
      root_path: /Workspace/Shared/bundles/${bundle.name}/${bundle.target}
