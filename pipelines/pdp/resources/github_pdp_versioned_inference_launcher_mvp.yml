resources:
  jobs:
    dev_jonathan_edvise_versioned_inference_launcher_mvp:
      name: "[dev jonathan] edvise_versioned_inference_launcher_mvp"
      max_concurrent_runs: 5
      run_as:
        service_principal_name: 6c8d8d76-1399-4065-aeb5-9474d32773cf
      tasks:
        - task_key: materialize_runtime_bundle
          description: >
            Resolve pipeline_version; fetch inference YAML, pyproject.toml, and
            release_requirements.txt from GitHub at that SHA into the release volume.
          spark_python_task:
            python_file: pipelines/pdp/launchers/materialize_runtime_bundle.py
            source: GIT
            parameters:
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --model_name
              - "{{job.parameters.model_name}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --release_base_path
              - "{{job.parameters.release_base_path}}"
              - --github_repo
              - "{{job.parameters.github_repo}}"
              - --wheel
              - "{{job.parameters.wheel_filename}}"
              - --entrypoint
              - "{{job.parameters.entrypoint}}"
          job_cluster_key: edvise-versioned-inference-launcher-mvp-cluster
        - task_key: versioned_inference_launcher_validate
          description: >
            Verify release bundle on volume (wheel present, compatibility vs archived YAML).
            Does not pip install or run smoke entrypoint.
          depends_on:
            - task_key: materialize_runtime_bundle
          spark_python_task:
            python_file: pipelines/pdp/launchers/versioned_inference_launcher.py
            source: GIT
            parameters:
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --model_name
              - "{{job.parameters.model_name}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --release_base_path
              - "{{job.parameters.release_base_path}}"
              - --validate-only
          job_cluster_key: edvise-versioned-inference-launcher-mvp-cluster
        - task_key: trigger_versioned_inference
          description: >
            Submit full PDP inference pipeline (multi-task) from archived bundle YAML
            at pipeline_version git SHA, wait for child run completion, and fail if
            inference fails. Per-step logs are on the submitted inference run.
          depends_on:
            - task_key: versioned_inference_launcher_validate
          spark_python_task:
            python_file: pipelines/pdp/launchers/trigger_versioned_inference.py
            source: GIT
            parameters:
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --model_name
              - "{{job.parameters.model_name}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --release_base_path
              - "{{job.parameters.release_base_path}}"
              - --git_url
              - "{{job.parameters.git_url}}"
              - --cohort_file_name
              - "{{job.parameters.cohort_file_name}}"
              - --course_file_name
              - "{{job.parameters.course_file_name}}"
              - --gcp_bucket_name
              - "{{job.parameters.gcp_bucket_name}}"
              - --datakind_notification_email
              - "{{job.parameters.datakind_notification_email}}"
              - --DK_CC_EMAIL
              - "{{job.parameters.DK_CC_EMAIL}}"
              - --ds_run_as
              - "{{job.parameters.ds_run_as}}"
              - --service_account_executer
              - "{{job.parameters.service_account_executer}}"
              - --datakind_group_to_manage_workflow
              - "{{job.parameters.datakind_group_to_manage_workflow}}"
              - --viewer_user
              - "{{job.parameters.viewer_user}}"
              - --inference_parameters_json
              - "{{job.parameters.inference_parameters_json}}"
          job_cluster_key: edvise-versioned-inference-launcher-mvp-cluster
      job_clusters:
        - job_cluster_key: edvise-versioned-inference-launcher-mvp-cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-cpu-ml-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            gcp_attributes:
              use_preemptible_executors: false
              availability: ON_DEMAND_GCP
              zone_id: HA
            node_type_id: n2-standard-8
            custom_tags:
              ResourceClass: SingleNode
              x-databricks-nextgen-cluster: "true"
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      git_source:
        git_url: https://github.com/datakind/edvise
        git_provider: gitHub
        git_commit: 28ac702361058b5c3c6d549a2da75bd2fd2116f8
      queue:
        enabled: true
      parameters:
        - name: databricks_institution_name
          default: "miles_cc"
        - name: model_name
          default: "retention_into_year_2_associates"
        - name: DB_workspace
          default: "dev_sst_02"
        - name: release_base_path
          default: "/Volumes/dev_sst_02/default/edvise_releases"
        - name: github_repo
          default: "datakind/edvise"
        - name: wheel_filename
          default: ""
        - name: entrypoint
          default: ""
        - name: git_url
          default: "https://github.com/datakind/edvise"
        - name: cohort_file_name
          default: ""
        - name: course_file_name
          default: ""
        - name: gcp_bucket_name
          default: ""
        - name: datakind_notification_email
          default: ""
        - name: DK_CC_EMAIL
          default: ""
        - name: ds_run_as
          default: ""
        - name: service_account_executer
          default: ""
        - name: datakind_group_to_manage_workflow
          default: ""
        - name: viewer_user
          default: ""
        - name: inference_parameters_json
          default: ""
