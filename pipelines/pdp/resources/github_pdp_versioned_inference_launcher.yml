# PDP versioned inference launcher — triggered by edvise-api (see inference_trigger_contract.py).
#
# API-overridden job parameters mirror edvise_github_sourced_pdp_inference_pipeline plus:
#   release_base_path, inference_parameters_json (optional archived-name overrides).
#
# Models trained in dev store pipeline_version as Git SHA; staging models store a release tag.
resources:
  jobs:
    edvise_versioned_inference_launcher:
      name: edvise_versioned_inference_launcher
      description: >
        Version-safe PDP inference entry point. Resolves the model's pipeline_version
        (Git SHA in dev, release tag in staging), materializes the archived DAB bundle,
        validates parameters, and submits the full inference DAG at that version.
        Trigger via edvise-api using inference_trigger_contract.py — do not run
        edvise_github_sourced_pdp_inference_pipeline directly for production inference.
      webhook_notifications:
        on_failure:
          - id: ${var.inference_slack_webhook_id}
      max_concurrent_runs: 5
      tasks:
        - task_key: materialize_runtime_bundle
          description: >
            Resolve pipeline_version from model metadata; fetch inference DAB YAML from
            GitHub at that SHA or tag into databricks_bundle_snapshot/ on the release volume.
          spark_python_task:
            python_file: pipelines/pdp/launchers/materialize_runtime_bundle.py
            source: GIT
            parameters:
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --model_name
              - "{{job.parameters.model_name}}"
              - --model_run_id
              - "{{job.parameters.model_run_id}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --release_base_path
              - "{{job.parameters.release_base_path}}"
              - --github_repo
              - "{{job.parameters.github_repo}}"
              - --launcher_run_id
              - "{{job.parameters.launcher_run_id}}"
          job_cluster_key: edvise-versioned-inference-launcher-cluster
        - task_key: versioned_inference_launcher_validate
          description: >
            Validate archived bundle (DBR/Python), resolve parameters from archived YAML,
            and fail fast before child inference submit.
          depends_on:
            - task_key: materialize_runtime_bundle
          spark_python_task:
            python_file: pipelines/pdp/launchers/versioned_inference_launcher.py
            source: GIT
            parameters:
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --model_name
              - "{{job.parameters.model_name}}"
              - --model_run_id
              - "{{job.parameters.model_run_id}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --release_base_path
              - "{{job.parameters.release_base_path}}"
              - --git_url
              - "{{job.parameters.git_url}}"
              - --cohort_file_name
              - "{{job.parameters.cohort_file_name}}"
              - --course_file_name
              - "{{job.parameters.course_file_name}}"
              - --gcp_bucket_name
              - "{{job.parameters.gcp_bucket_name}}"
              - --datakind_notification_email
              - "{{job.parameters.datakind_notification_email}}"
              - --DK_CC_EMAIL
              - "{{job.parameters.DK_CC_EMAIL}}"
              - --ds_run_as
              - "{{job.parameters.ds_run_as}}"
              - --service_account_executer
              - "{{job.parameters.service_account_executer}}"
              - --datakind_group_to_manage_workflow
              - "{{job.parameters.datakind_group_to_manage_workflow}}"
              - --inference_parameters_json
              - "{{job.parameters.inference_parameters_json}}"
              - --launcher_run_id
              - "{{job.parameters.launcher_run_id}}"
          job_cluster_key: edvise-versioned-inference-launcher-cluster
        - task_key: trigger_versioned_inference
          description: >
            Submit full PDP inference pipeline (multi-task) from archived bundle YAML at
            the model's pipeline_version, wait for child run completion, and fail if
            inference fails. Per-step logs are on the submitted inference run.
          depends_on:
            - task_key: versioned_inference_launcher_validate
          spark_python_task:
            python_file: pipelines/pdp/launchers/trigger_versioned_inference.py
            source: GIT
            parameters:
              - --databricks_institution_name
              - "{{job.parameters.databricks_institution_name}}"
              - --model_name
              - "{{job.parameters.model_name}}"
              - --model_run_id
              - "{{job.parameters.model_run_id}}"
              - --DB_workspace
              - "{{job.parameters.DB_workspace}}"
              - --release_base_path
              - "{{job.parameters.release_base_path}}"
              - --git_url
              - "{{job.parameters.git_url}}"
              - --cohort_file_name
              - "{{job.parameters.cohort_file_name}}"
              - --course_file_name
              - "{{job.parameters.course_file_name}}"
              - --gcp_bucket_name
              - "{{job.parameters.gcp_bucket_name}}"
              - --datakind_notification_email
              - "{{job.parameters.datakind_notification_email}}"
              - --DK_CC_EMAIL
              - "{{job.parameters.DK_CC_EMAIL}}"
              - --ds_run_as
              - "{{job.parameters.ds_run_as}}"
              - --service_account_executer
              - "{{job.parameters.service_account_executer}}"
              - --datakind_group_to_manage_workflow
              - "{{job.parameters.datakind_group_to_manage_workflow}}"
              - --inference_parameters_json
              - "{{job.parameters.inference_parameters_json}}"
              - --launcher_run_id
              - "{{job.parameters.launcher_run_id}}"
          job_cluster_key: edvise-versioned-inference-launcher-cluster
      job_clusters:
        - job_cluster_key: edvise-versioned-inference-launcher-cluster
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-cpu-ml-scala2.12
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            gcp_attributes:
              use_preemptible_executors: false
              availability: ON_DEMAND_GCP
              zone_id: HA
            node_type_id: n2-standard-8
            custom_tags:
              ResourceClass: SingleNode
              x-databricks-nextgen-cluster: "true"
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      queue:
        enabled: true
      parameters:
        - name: databricks_institution_name
          default: ${var.databricks_institution_name}
        - name: model_name
          default: ${var.model_name}
        - name: model_run_id
          default: ""
        - name: DB_workspace
          default: ${var.DB_workspace}
        - name: release_base_path
          default: ${var.release_base_path}
        - name: github_repo
          default: "datakind/edvise"
        - name: git_url
          default: "https://github.com/datakind/edvise"
        - name: cohort_file_name
          default: ""
        - name: course_file_name
          default: ""
        - name: gcp_bucket_name
          default: ""
        - name: datakind_notification_email
          default: ${var.datakind_notification_email}
        - name: DK_CC_EMAIL
          default: ${var.DK_CC_EMAIL}
        - name: ds_run_as
          default: ${var.ds_run_as}
        - name: service_account_executer
          default: ${var.service_account_executer}
        - name: datakind_group_to_manage_workflow
          default: ${var.datakind_group_to_manage_workflow}
        - name: inference_parameters_json
          default: ""
        - name: launcher_run_id
          default: "{{job.run_id}}"
      permissions:
        - group_name: ${var.datakind_group_to_manage_workflow}
          level: CAN_MANAGE
        - service_principal_name: ${var.ds_run_as}
          level: CAN_MANAGE
        - user_name: ${var.service_account_executer}
          level: CAN_MANAGE
